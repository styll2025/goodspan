[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[redirects]]
  from = "/seasons"
  to = "/seasons.html"
  status = 200

[[redirects]]
  from = "/home"
  to = "/index.html"
  status = 200
